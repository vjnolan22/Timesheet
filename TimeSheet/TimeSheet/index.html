<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>TimeSheet</title>
  <meta name="theme-color" content="#0f172a" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TimeSheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>TimeSheet</h1>
      <button id="menuExportBtn" class="icon-btn" title="Export / Import data" aria-label="Export or import data">⋯</button>
    </header>

    <div id="reminderBanner" class="reminder-banner hidden" role="alert">
      ⏰ You've been clocked in a long time — don't forget to clock out.
    </div>

    <section class="status-card">
      <div class="status-line">
        <span id="statusDot" class="status-dot status-out"></span>
        <span id="statusText">Not clocked in</span>
      </div>
      <div id="timerDisplay" class="timer hidden">00:00:00</div>
      <div id="breakTimerDisplay" class="timer break-timer hidden">Break: 00:00:00</div>
    </section>

    <section class="actions">
      <button id="clockInBtn" class="action-btn clock-in">Clock In</button>
      <button id="breakBtn" class="action-btn break" disabled>Start Break</button>
      <button id="clockOutBtn" class="action-btn clock-out" disabled>Clock Out</button>
    </section>

    <section class="totals">
      <div class="total-tile">
        <div class="total-label">This Week</div>
        <div id="weekTotal" class="total-value">0h 00m</div>
      </div>
      <div class="total-tile">
        <div class="total-label">This Month</div>
        <div id="monthTotal" class="total-value">0h 00m</div>
      </div>
    </section>

    <section class="history">
      <h2>History</h2>
      <div id="historyList" class="history-list">
        <p class="empty-state">No shifts recorded yet.</p>
      </div>
    </section>
  </div>

  <div id="editModal" class="modal hidden">
    <div class="modal-content">
      <h3>Edit Shift</h3>
      <form id="editForm">
        <label>Clock In
          <input type="datetime-local" id="editClockIn" step="60" required />
        </label>
        <label>Clock Out
          <input type="datetime-local" id="editClockOut" step="60" required />
        </label>
        <div id="editBreaksContainer"></div>
        <button type="button" id="addBreakBtn" class="secondary-btn">+ Add Break</button>
        <div class="modal-actions">
          <button type="button" id="deleteShiftBtn" class="danger-btn">Delete</button>
          <div class="modal-actions-right">
            <button type="button" id="cancelEditBtn" class="secondary-btn">Cancel</button>
            <button type="submit" class="primary-btn">Save</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <div id="exportModal" class="modal hidden">
    <div class="modal-content">
      <h3>Export / Import Data</h3>
      <p class="modal-hint">Back up your shifts to a file, or restore from a previous backup.</p>
      <div class="modal-actions modal-actions-stack">
        <button id="exportBtn" class="primary-btn">Export Backup (.json)</button>
        <label class="primary-btn file-label">
          Import Backup (.json)
          <input type="file" id="importInput" accept="application/json" hidden />
        </label>
        <button id="enableNotifsBtn" class="secondary-btn">Enable Reminder Notifications</button>
      </div>
      <div class="modal-actions">
        <button type="button" id="closeExportBtn" class="secondary-btn">Close</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
